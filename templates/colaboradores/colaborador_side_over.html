<!-- Estructura Side-Over para HTMX -->
<div x-data="{ open: false }" 
     x-init="$nextTick(() => open = true)" 
     @keydown.escape.window="open = false; setTimeout(() => $el.remove(), 300)"
     class="fixed inset-0 z-[100] overflow-hidden" 
     aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
    
    <div class="absolute inset-0 overflow-hidden">
        <!-- Overlay -->
        <div x-show="open" 
             x-transition:enter="ease-in-out duration-500" 
             x-transition:enter-start="opacity-0" 
             x-transition:enter-end="opacity-100" 
             x-transition:leave="ease-in-out duration-500" 
             x-transition:leave-start="opacity-100" 
             x-transition:leave-end="opacity-0" 
             @click="open = false; setTimeout(() => $el.closest('[role=dialog]').remove(), 300)"
             class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" aria-hidden="true"></div>

        <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
            <div x-show="open" 
                 x-transition:enter="transform transition ease-in-out duration-500 sm:duration-700" 
                 x-transition:enter-start="translate-x-full" 
                 x-transition:enter-end="translate-x-0" 
                 x-transition:leave="transform transition ease-in-out duration-500 sm:duration-700" 
                 x-transition:leave-start="translate-x-0" 
                 x-transition:leave-end="translate-x-full" 
                 class="pointer-events-auto w-screen max-w-2xl">
                
                <div class="flex h-full flex-col overflow-y-auto bg-surface-container shadow-2xl border-l border-white/5">
                    <!-- Header del Side-Over -->
                    <div class="px-6 py-6 bg-white/[0.02] border-b border-white/5 flex items-center justify-between">
                        <h2 class="text-lg font-black uppercase tracking-widest text-on-background" id="slide-over-title">Detalle del Colaborador</h2>
                        <button @click="open = false; setTimeout(() => $el.closest('[role=dialog]').remove(), 300)" class="text-jmie-gray hover:text-white transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <div class="relative flex-1 p-8">
                        {% include "colaboradores/partials/detail_content.html" %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
