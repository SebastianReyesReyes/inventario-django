<div x-data="{ showModal: true }" x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div @click="showModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div class="relative bg-surface-container rounded-2xl border border-white/10 shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-on-background flex items-center gap-2">
                    <span class="material-symbols-outlined text-jmie-orange">inventory_2</span>
                    Entregar Accesorio
                </h3>
                <button @click="showModal = false" class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form hx-post="{% url 'dispositivos:colaborador_entrega_accesorio' colaborador.pk %}"
                  hx-target="#modal-container"
                  hx-disabled-elt="this"
                  class="space-y-5">
                {% csrf_token %}

                <div>
                    {{ form.tipo.label_tag }}
                    {{ form.tipo }}
                    <datalist id="tipos-comunes-list">
                        {% for tipo in tipos_comunes %}
                            <option value="{{ tipo }}">
                        {% endfor %}
                    </datalist>
                </div>

                <div>
                    {{ form.cantidad.label_tag }}
                    {{ form.cantidad }}
                </div>

                <div>
                    {{ form.descripcion.label_tag }}
                    {{ form.descripcion }}
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" @click="showModal = false"
                            class="px-5 py-2.5 rounded-xl border border-white/10 text-on-background hover:bg-white/5 transition-all text-xs font-bold">
                        Cancelar
                    </button>
                    <button type="submit" 
                            class="px-5 py-2.5 rounded-xl bg-jmie-orange text-white font-bold hover:shadow-[0_0_20px_rgba(255,107,0,0.3)] transition-all flex items-center gap-2">
                        <span>Registrar Entrega</span>
                        <div class="htmx-indicator animate-spin h-4 w-4 border-2 border-white/30 border-t-white rounded-full"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
