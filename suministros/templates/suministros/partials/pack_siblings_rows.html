<div id="pack-rows" class="mt-4 border-t border-white/10 pt-4 animate-in slide-in-from-top-2 duration-300">
    <p class="text-[10px] font-black uppercase text-jmie-blue tracking-widest mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-sm">auto_awesome</span>
        Pack Sugerido (Insumos compatibles)
    </p>
    <div class="space-y-3">
        {% for sibling in siblings %}
        <div class="flex items-center justify-between p-3 bg-white/[0.03] border border-white/5 rounded-xl hover:bg-white/[0.05] transition-colors">
            <div class="flex-grow min-w-0 pr-4">
                <div class="text-xs font-bold text-on-background truncate">{{ sibling.nombre }}</div>
                <div class="text-[10px] text-jmie-gray">{{ sibling.categoria.nombre }} • Stock: {{ sibling.stock_actual }}</div>
            </div>
            <div class="flex items-center gap-3">
                <button type="button"
                        hx-get="{% url 'suministros:movimiento_pack_create' %}?base_id={{ suministro_base.id }}"
                        hx-target="#modal-container"
                        class="px-3 py-1.5 rounded-lg bg-jmie-blue text-white text-[10px] font-black uppercase tracking-widest hover:brightness-110 shadow-lg shadow-jmie-blue/20 transition-all flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-xs">inventory_2</span>
                    Registrar como Pack
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
