<div x-data="{ 
    showModal: true,
    tipo: 'SALIDA',
    selectedItems: [
        {% for s in suministros %}
        { 
            id: {{ s.id }}, 
            nombre: '{{ s.nombre|escapejs }}', 
            stock: {{ s.stock_actual }}, 
            qty: 1
        },
        {% endfor %}
    ],
    checkError(item) {
        return item.qty > item.stock && (this.tipo === 'SALIDA' || this.tipo === 'AJUSTE_NEG');
    },
    get canSubmit() {
        return this.selectedItems.every(item => !this.checkError(item)) && this.selectedItems.some(item => item.qty > 0);
    }
}" 
x-show="showModal" 
@modal-close.window="showModal = false" 
class="fixed inset-0 z-[60] flex items-center justify-center p-4" x-cloak>
    <div @click="showModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div class="relative bg-surface-container rounded-2xl border border-white/10 shadow-2xl w-full max-w-2xl overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-on-background flex items-center gap-2">
                    <span class="material-symbols-outlined text-jmie-blue">inventory_2</span>
                    Movimiento de Pack
                </h3>
                <button @click="showModal = false" class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form hx-post="{% url 'suministros:movimiento_pack_create' %}"
                  hx-target="#modal-container"
                  hx-indicator=".htmx-indicator"
                  hx-on::after-request="if(event.detail.xhr.status === 204) { window.dispatchEvent(new CustomEvent('modal-close')); window.dispatchEvent(new CustomEvent('show-notification', { detail: { message: 'Movimientos de pack registrados correctamente', type: 'success' } })); }"
                  class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="ids" value="{{ ids_str }}">

                <!-- Datos Comunes -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/[0.02] p-4 rounded-xl border border-white/5">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter">Tipo de Movimiento</label>
                        <select name="tipo_movimiento" x-model="tipo"
                                class="w-full bg-surface-container-high border-[1px] border-white/5 rounded-lg px-4 py-2 text-sm text-on-background appearance-none">
                            {% for value, label in form.fields.tipo_movimiento.choices %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="space-y-1.5" x-show="tipo === 'SALIDA'">
                        <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter">Destinatario</label>
                        {{ form.colaborador_destino }}
                    </div>
                    <div class="space-y-1.5" x-show="tipo === 'SALIDA'">
                        <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter">Centro de Costo</label>
                        {{ form.centro_costo }}
                    </div>
                    <div class="space-y-1.5" x-show="tipo === 'SALIDA'">
                        <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter">Dispositivo Destino</label>
                        {{ form.dispositivo_destino }}
                    </div>
                    <div class="space-y-1.5 md:col-span-2">
                        <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter">Notas / Observaciones</label>
                        <textarea name="notas" rows="1" class="w-full bg-surface-container-high border-[1px] border-white/5 rounded-lg px-4 py-2 text-sm text-on-background placeholder:text-jmie-gray" placeholder="Opcional..."></textarea>
                    </div>
                </div>

                <!-- Tabla de Items -->
                <div class="overflow-hidden border border-white/5 rounded-xl">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-white/5 text-jmie-gray uppercase text-[10px] font-black tracking-widest">
                            <tr>
                                <th class="px-4 py-3">Insumo</th>
                                <th class="px-4 py-3 text-center">Stock</th>
                                <th class="px-4 py-3 text-right w-32">Cantidad</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5">
                            {% for s in suministros %}
                            <tr class="hover:bg-white/[0.02] transition-colors"
                                x-data="{ qty: 1, stock: {{ s.stock_actual }} }"
                                x-init="$watch('qty', v => { 
                                    let item = selectedItems.find(i => i.id === {{ s.id }});
                                    if(item) item.qty = v;
                                })"
                                :class="(qty > stock && (tipo === 'SALIDA' || tipo === 'AJUSTE_NEG')) ? 'bg-red-500/5' : ''">
                                <td class="px-4 py-3 font-bold text-on-background">{{ s.nombre }}</td>
                                <td class="px-4 py-3 text-center">
                                    <span class="px-2 py-0.5 rounded-full text-[10px] font-bold {% if s.stock_actual <= 0 %}bg-red-500/20 text-red-400{% else %}bg-emerald-500/20 text-emerald-400{% endif %}">
                                        {{ s.stock_actual }}
                                    </span>
                                </td>
                                <td class="px-4 py-3">
                                    <div class="flex flex-col items-end">
                                        <input type="number" name="qty_{{ s.id }}" x-model.number="qty" min="0"
                                               class="w-20 bg-surface-container-high border-[1px] rounded-lg px-3 py-1.5 text-center text-sm border-white/10 text-on-background focus:ring-jmie-blue/20"
                                               :class="(qty > stock && (tipo === 'SALIDA' || tipo === 'AJUSTE_NEG')) ? 'border-red-500/50 text-red-400 focus:ring-red-500/20' : ''">
                                        <span x-show="qty > stock && (tipo === 'SALIDA' || tipo === 'AJUSTE_NEG')" 
                                              class="text-[9px] text-red-400 font-black mt-1 uppercase tracking-tighter" x-cloak>
                                            Stock insuficiente
                                        </span>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" @click="showModal = false"
                            class="px-5 py-2.5 rounded-xl border border-white/10 text-on-background hover:bg-white/5 transition-all text-xs font-bold">
                        Cancelar
                    </button>
                    <button type="submit" :disabled="!canSubmit"
                            class="px-6 py-2.5 rounded-xl bg-jmie-blue text-white font-black uppercase tracking-widest text-[10px] hover:brightness-110 shadow-[0_4px_15px_rgba(0,53,148,0.3)] transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span>Confirmar Pack</span>
                        <div class="htmx-indicator animate-spin h-3 w-3 border-2 border-white/30 border-t-white rounded-full"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
