services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventario_jmie_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,*
      - DB_PATH=/app/data/db.sqlite3
    volumes:
      # Persistencia de datos CRÍTICA para el piloto
      - ./data:/app/data
      # Volumen compartido para estáticos recolectados
      - static_volume:/app/static
    networks:
      - inventario_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.25-alpine
    container_name: inventario_jmie_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./ops/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/media:/app/media:ro
      - static_volume:/app/static:ro
    networks:
      - inventario_network
    depends_on:
      web:
        condition: service_healthy

volumes:
  static_volume:

networks:
  inventario_network:
    driver: bridge
