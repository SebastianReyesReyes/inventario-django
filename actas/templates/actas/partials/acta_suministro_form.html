<div x-data="{ open: true }" 
     x-show="open" 
     x-cloak
     @modal-close.window="open = false; setTimeout(() => { $el.remove() }, 500)"
     class="fixed inset-0 z-50 flex items-center justify-center p-4">
    
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-background/80 backdrop-blur-md" @click="open = false; setTimeout(() => { $el.remove() }, 500)"></div>

    <!-- Modal Content -->
    <div x-show="open"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         class="relative w-full max-w-2xl bg-surface-container border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-visible">
        
        <!-- Glow Effect -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-amber-500/10 blur-[80px] rounded-full"></div>

        <div class="p-8 relative">
            <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-amber-500/10 flex items-center justify-center text-amber-400 border border-amber-500/20">
                        <span class="material-symbols-outlined text-3xl">inventory_2</span>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black tracking-tighter uppercase">Generar Acta de Suministros</h2>
                        <p class="text-jmie-gray text-xs font-bold uppercase tracking-widest mt-0.5">Entrega de Consumibles y Periféricos</p>
                    </div>
                </div>
                <button @click="open = false; setTimeout(() => { $el.remove() }, 500)" class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="acta-suministro-form"
                  class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="tipo_acta" value="ENTREGA_SUMINISTROS">

                <!-- Error Container -->
                <div id="acta-errors" class="empty:hidden"></div>
                
                <div class="grid grid-cols-1 gap-6">
                    <div class="space-y-2">
                        <c-form-label>Colaborador</c-form-label>
                        {{ form.colaborador }}
                    </div>
                </div>

                <div class="space-y-2">
                    <c-form-label>Movimientos Pendientes de Acta</c-form-label>
                    <div id="movimientos-container"
                         hx-get="{% url 'actas:acta_movimientos_pendientes' colaborador_pk=0 %}"
                         hx-trigger="refreshMovimientos from:body"
                         hx-target="#movimientos-container"
                         hx-swap="innerHTML"
                         class="bg-surface-container-low rounded-2xl border border-white/5 p-4 min-h-[120px] max-h-[200px] overflow-y-auto custom-scrollbar">
                        <p class="text-xs text-jmie-gray italic text-center py-4">Seleccione un colaborador para ver los movimientos.</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <c-form-label>Observaciones</c-form-label>
                    {{ form.observaciones }}
                </div>

                <div class="pt-6 border-t border-white/5 flex items-center justify-between">
                    <div id="form-indicator" class="htmx-indicator flex items-center gap-2 text-jmie-blue">
                        <div class="w-4 h-4 border-2 border-current border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-[10px] font-black uppercase tracking-widest">Generando Documento...</span>
                    </div>

                    <div class="flex gap-3 ml-auto">
                        <button type="button"
                                @click="open = false; setTimeout(() => { $el.remove() }, 500)"
                                class="px-6 py-2.5 text-xs font-black uppercase tracking-widest text-jmie-gray hover:text-on-background border border-white/10 rounded-xl hover:bg-white/5 transition-all">
                            Cancelar
                        </button>
                        <button type="button"
                                hx-post="{% url 'actas:acta_suministro_preview' %}"
                                hx-include="#acta-suministro-form"
                                hx-target="#preview-sideover-container"
                                hx-swap="innerHTML"
                                hx-indicator="#form-indicator"
                                class="px-8 py-2.5 bg-amber-500 text-white text-xs font-black uppercase tracking-widest rounded-xl hover:brightness-110 shadow-[0_10px_30px_rgba(245,158,11,0.2)] transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">preview</span>
                            Previsualizar Acta
                        </button>
                    </div>
                </div>
            </form>

            <!-- Contenedor donde se inyecta el side-over de preview -->
            <div id="preview-sideover-container"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        const selectColaborador = document.querySelector('.htmx-colaborador-select');
        
        if (selectColaborador) {
            selectColaborador.addEventListener('change', function(e) {
                const val = e.target.value;
                const container = document.getElementById('movimientos-container');
                if (val) {
                    const urlMovimientos = `{% url 'actas:acta_movimientos_pendientes' 0 %}`.replace('/0/', '/' + val + '/');
                    htmx.ajax('GET', urlMovimientos, {target: '#movimientos-container'});
                } else {
                    container.innerHTML = '<p class="text-xs text-jmie-gray italic text-center py-4">Seleccione un colaborador para ver los movimientos.</p>';
                }
            });
        }
    })();
</script>
