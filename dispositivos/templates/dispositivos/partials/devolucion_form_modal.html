<div x-data="{ showModal: true }" x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div @click="showModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    
    <div class="relative bg-surface-container rounded-2xl border border-white/10 shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-on-background flex items-center gap-2">
                    <span class="material-symbols-outlined text-jmie-gray">undo</span>
                    Retorno a Bodega
                </h3>
                <button @click="showModal = false" class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="mb-6 p-3 bg-white/5 border border-white/10 rounded-xl">
                <p class="text-[10px] text-jmie-gray uppercase tracking-widest font-black mb-1">Devolviendo de</p>
                <p class="text-xs text-on-background font-bold truncate">{{ colaborador.nombre_completo }}</p>
            </div>

            <form hx-post="{% url 'dispositivos:dispositivo_devolver' dispositivo.pk %}"
                  hx-target="#modal-container"
                  hx-disabled-elt="this"
                  class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter ml-1 mb-2 block">Estado de Recepción</label>
                    <div class="grid grid-cols-2 gap-3">
                        {% for radio in form.estado_llegada %}
                            <label class="relative flex items-center gap-3 p-3 border border-white/5 bg-surface-container-high rounded-xl cursor-pointer hover:bg-white/5 transition-all">
                                {{ radio.tag }}
                                <span class="text-[10px] font-black uppercase text-on-surface">{{ radio.choice_label|truncatechars:20 }}</span>
                            </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter ml-1">Notas de Devolución</label>
                    {{ form.condicion_fisica }}
                </div>

                <div class="p-4 bg-jmie-orange/5 border border-jmie-orange/10 rounded-xl flex items-center gap-3">
                    {{ form.generar_acta }}
                    <label for="{{ form.generar_acta.id_for_label }}" class="text-xs font-bold text-on-surface cursor-pointer">
                        Generar Acta de Devolución automáticamente
                    </label>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" @click="showModal = false"
                            class="px-5 py-2.5 rounded-xl border border-white/10 text-on-background hover:bg-white/5 transition-all text-xs font-bold">
                        Cancelar
                    </button>
                    <button type="submit" 
                            class="px-6 py-2.5 rounded-xl bg-surface-container-highest text-white font-black uppercase tracking-widest text-[10px] border border-white/10 hover:bg-white/10 transition-all flex items-center gap-2">
                        <span>Registrar Devolución</span>
                        <div class="htmx-indicator animate-spin h-3 w-3 border-2 border-white/30 border-t-white rounded-full"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
