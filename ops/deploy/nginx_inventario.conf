server {
    listen 80;
    server_name _;  # Reemplazar con el dominio o IP pública

    # Logs
    access_log /var/log/nginx/inventario-access.log;
    error_log /var/log/nginx/inventario-error.log;

    # Tamaño máximo de carga de archivos
    client_max_body_size 20M;

    # Archivos estáticos
    location /static/ {
        alias /var/www/inventario-django/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Archivos media
    location /media/ {
        alias /var/www/inventario-django/media/;
        expires 1M;
        add_header Cache-Control "public";
    }

    # Proxy pass a Gunicorn
    location / {
        proxy_pass http://unix:/run/gunicorn/inventario.sock;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
