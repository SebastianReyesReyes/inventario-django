{% if label %}
<div class="space-y-2 {{ wrapper_class }}">
    <label class="text-[10px] font-black uppercase text-jmie-gray ml-1">{{ label }}</label>
{% endif %}
    <div class="relative group {{ class }}">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-jmie-gray group-focus-within:text-jmie-blue transition-colors text-sm">search</span>
        <input type="text" 
               name="{{ name|default:'q' }}" 
               {% if value %}value="{{ value }}"{% endif %}
               placeholder="{{ placeholder }}"
               class="pl-10 pr-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-xs font-bold text-on-background focus:outline-none focus:ring-2 focus:ring-jmie-blue/20 focus:border-jmie-blue/50 transition-all w-full"
               {% if hx_get %}hx-get="{{ hx_get }}"{% endif %}
               {% if hx_target %}hx-target="{{ hx_target }}"{% endif %}
               {% if hx_trigger %}hx-trigger="{{ hx_trigger }}"{% endif %}
               {% if hx_indicator %}hx-indicator="{{ hx_indicator }}"{% endif %}
               {{ attrs }}>
    </div>
{% if label %}
</div>
{% endif %}
