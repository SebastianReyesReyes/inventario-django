<div class="{% if compact|default:False %}py-10{% else %}py-20{% endif %} flex flex-col items-center justify-center text-center animate-in fade-in zoom-in duration-500">
    <div class="{% if compact|default:False %}mb-4{% else %}mb-8{% endif %} relative">
        <div class="absolute inset-0 bg-{{ icon_color|default:'jmie-orange' }}/10 blur-3xl rounded-full scale-150"></div>
        <div class="{% if compact|default:False %}w-16 h-16 rounded-2xl{% else %}w-24 h-24 rounded-[2rem]{% endif %} bg-surface-container border border-white/5 flex items-center justify-center text-{{ icon_color|default:'jmie-orange' }} relative z-10 shadow-2xl">
            <span class="material-symbols-outlined {% if compact|default:False %}text-3xl{% else %}text-5xl{% endif %}">{{ icon|default:'inventory_2' }}</span>
        </div>
    </div>
    
    <h3 class="{% if compact|default:False %}text-sm{% else %}text-2xl{% endif %} font-black tracking-tighter text-on-background uppercase mb-2">
        {{ title|default:'Sin registros' }}
    </h3>
    <p class="text-jmie-gray {% if compact|default:False %}text-[10px]{% else %}text-sm{% endif %} font-bold max-w-xs mx-auto leading-relaxed">
        {{ subtitle|default:'No se encontraron elementos que coincidan con su búsqueda actual.' }}
    </p>

    {% if action_url %}
    <div class="{% if compact|default:False %}mt-4{% else %}mt-8{% endif %}">
        <a href="{{ action_url }}" 
           {% if action_htmx %}hx-get="{{ action_url }}" hx-target="{{ action_target|default:'#modal-container' }}"{% endif %}
           class="{% if compact|default:False %}px-4 py-2{% else %}px-6 py-3{% endif %} bg-white/5 border border-white/10 text-on-background text-[10px] font-black uppercase tracking-[0.2em] rounded-xl hover:bg-white/10 transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">{{ action_icon|default:'add' }}</span>
            {{ action_label|default:'Crear Nuevo' }}
        </a>
    </div>
    {% endif %}
</div>
