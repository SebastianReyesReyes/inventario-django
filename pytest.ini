[pytest]
DJANGO_SETTINGS_MODULE = inventario_jmie.settings
python_files = tests.py test_*.py *_tests.py
addopts = --cov=. --cov-report=term-missing --reuse-db --ignore=test_output.txt --ignore=media --ignore=static --ignore=venv
markers =
    e2e: End-to-end tests using Playwright
    integration: Integration tests for business logic
    unit: Fast unit tests
    slow: Slow tests that launch a real browser or heavy I/O
