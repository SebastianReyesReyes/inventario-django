<!DOCTYPE html>
<html lang="es">
{% load acta_tags %}

<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: letter;
            margin: 1.5cm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.3;
            color: #222;
        }

        .header {
            border-bottom: 2px solid #003594;
            padding-bottom: 10pt;
            margin-bottom: 15pt;
        }

        .logo {
            float: left;
            width: 130pt;
        }

        .acta-info {
            float: right;
            text-align: right;
        }

        .acta-info h1 {
            font-size: 16pt;
            margin: 0;
            color: #003594;
            text-transform: uppercase;
        }

        .acta-info p {
            margin: 1pt 0;
            font-weight: bold;
        }

        .clear {
            clear: both;
        }

        .section-title {
            background-color: #f1f3f8;
            padding: 4pt 8pt;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 8.5pt;
            margin: 12pt 0 4pt 0;
            border-left: 3pt solid #ED8B00;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10pt;
        }

        table th {
            background-color: #003594;
            color: white;
            font-size: 7.5pt;
            padding: 5pt;
            text-transform: uppercase;
            text-align: left;
        }

        table td {
            border: 0.5pt solid #ccc;
            padding: 5pt;
            font-size: 7.5pt;
        }

        .clauses {
            font-size: 8pt;
            text-align: justify;
            margin-top: 15pt;
        }

        .clauses h3 {
            font-size: 8.5pt;
            margin-bottom: 3pt;
            color: #003594;
            border-bottom: 0.5pt solid #eee;
        }

        .clauses ol {
            margin-top: 2pt;
            padding-left: 12pt;
        }

        .clauses li {
            margin-bottom: 3pt;
        }

        .signatures {
            margin-top: 30pt;
            page-break-inside: avoid;
        }

        .signature-row {
            width: 100%;
            margin-bottom: 20pt;
        }

        .signature-box {
            width: 30%;
            float: left;
            text-align: center;
            margin-right: 3%;
        }

        .signature-line {
            border-top: 0.5pt solid #333;
            margin-top: 35pt;
            padding-top: 4pt;
        }

        .footer-legal {
            margin-top: 20pt;
            border-top: 0.5pt solid #ddd;
            padding-top: 8pt;
            font-size: 7pt;
            color: #888;
            text-align: center;
            font-style: italic;
            page-break-inside: avoid;
        }

        .observation-box {
            font-size: 8pt;
            min-height: 30pt;
            padding: 5pt;
            border: 0.5pt solid #ccc;
            background-color: #fafafa;
            page-break-inside: avoid;
        }
    </style>
</head>

<body>
    {% include "actas/partials/acta_pdf_body.html" %}
</body>

</html>
