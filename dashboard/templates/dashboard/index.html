{% extends "base.html" %}
{% load static %}

{% block title %}Centro de Mando | JMIE{% endblock %}
{% block section_name %}Analítica e Inventario{% endblock %}

{% block content %}
<div class="space-y-10" id="dashboard-wrapper" x-data="{ activeTab: 'hardware' }">

    <!-- Scripts de Gráficos (Chart.js) para la pestaña estratégica -->
    <script>
        // Inicialización global para evitar colisiones en recargas parciales de HTMX
        let charts = {};

        function createOrUpdateChart(id, config) {
            const canS = document.getElementById(id);
            if (!canS) {
                console.warn(`[Dashboard] Canvas element with id "${id}" not found.`);
                return;
            }

            try {
                if (charts[id]) {
                    charts[id].destroy();
                }
                const ctx = canS.getContext('2d');
                charts[id] = new Chart(ctx, config);
            } catch (error) {
                console.error(`[Dashboard] Error creating chart "${id}":`, error);
            }
        }
    </script>

    <!-- Header del Dashboard -->
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-8 border-b border-white/5 pb-8">
        <div>
            <h1 class="font-sans text-4xl lg:text-5xl font-black tracking-tighter">Centro de Mando</h1>
            <p class="text-jmie-gray mt-2 text-sm font-bold uppercase tracking-widest opacity-80">Vista Operacional y Estratégica</p>
        </div>
    </div>

    <!-- Tabs Nav -->
    <div class="flex space-x-4 border-b border-white/10 overflow-x-auto">
        <button @click="activeTab = 'hardware'"
                :class="activeTab === 'hardware' ? 'border-jmie-blue text-white' : 'border-transparent text-jmie-gray hover:text-white hover:border-white/20'"
                class="px-6 py-3 border-b-2 font-bold text-sm tracking-widest uppercase transition-colors whitespace-nowrap"
                hx-get="{% url 'dashboard:tab_hardware' %}" hx-target="#tab-content" hx-trigger="click">
            Disponibilidad Hardware
        </button>
        <button @click="activeTab = 'suministros'"
                :class="activeTab === 'suministros' ? 'border-jmie-blue text-white' : 'border-transparent text-jmie-gray hover:text-white hover:border-white/20'"
                class="px-6 py-3 border-b-2 font-bold text-sm tracking-widest uppercase transition-colors whitespace-nowrap"
                hx-get="{% url 'dashboard:tab_suministros' %}" hx-target="#tab-content" hx-trigger="click">
            Packs de Suministros
        </button>
        <button @click="activeTab = 'estrategico'"
                :class="activeTab === 'estrategico' ? 'border-jmie-blue text-white' : 'border-transparent text-jmie-gray hover:text-white hover:border-white/20'"
                class="px-6 py-3 border-b-2 font-bold text-sm tracking-widest uppercase transition-colors whitespace-nowrap"
                hx-get="{% url 'dashboard:tab_estrategico' %}" hx-target="#tab-content" hx-trigger="click">
            Vista Estratégica
        </button>
    </div>

    <!-- Contenedor de Pestañas -->
    <div id="tab-content" hx-get="{% url 'dashboard:tab_hardware' %}" hx-trigger="load">
        <div class="flex justify-center items-center py-20">
            <span class="text-jmie-gray material-symbols-outlined animate-spin text-4xl">refresh</span>
        </div>
    </div>

</div>
{% endblock %}
