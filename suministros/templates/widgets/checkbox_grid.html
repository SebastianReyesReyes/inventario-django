<div class="{{ widget.attrs.class }}">
    {% for group, options, index in widget.optgroups %}
        {% for option in options %}
            <label class="flex items-center space-x-3 p-3 rounded-xl bg-surface-container-high/40 hover:bg-surface-container-high border border-white/5 cursor-pointer transition-all group">
                <input type="checkbox" name="{{ widget.name }}" value="{{ option.value }}" 
                    {% if option.selected %}checked{% endif %}
                    class="w-5 h-5 rounded border-white/10 bg-surface-container-highest text-jmie-orange focus:ring-jmie-orange/40 transition-all">
                <span class="text-sm font-medium group-hover:text-jmie-orange transition-colors">
                    {{ option.label }}
                </span>
            </label>
        {% endfor %}
    {% endfor %}
</div>
