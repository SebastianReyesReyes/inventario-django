<!-- Encabezado de Página Reutilizable -->
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-white/5 pb-6 {{ class }}" {{ attrs }}>
    <div>
        {% if pretitle %}
        <div class="flex items-center text-[10px] font-black text-jmie-orange uppercase tracking-[0.3em] mb-2">
            <span>{{ pretitle }}</span>
            {% if pretitle_link %}
            <span class="material-symbols-outlined mx-2 text-[12px]">chevron_right</span>
            <span class="text-on-background">{{ pretitle_link }}</span>
            {% endif %}
        </div>
        {% endif %}
        <h1 class="text-3xl font-black tracking-tighter {{ title_class|default:'text-on-background' }}">{{ title }}</h1>
        {% if subtitle %}
        <p class="text-jmie-gray mt-1 text-sm font-bold">{{ subtitle }}</p>
        {% endif %}
    </div>
    {% if slot %}
    <div class="flex items-center gap-3">
        {{ slot }}
    </div>
    {% endif %}
</div>
