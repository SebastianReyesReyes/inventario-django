<div x-data="{ showModal: true }" x-show="showModal" 
     x-transition:enter="ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div @click="showModal = false; setTimeout(() => location.reload(), 150)" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    
    <div class="relative bg-surface-container rounded-2xl border border-white/10 shadow-2xl w-full max-w-md overflow-hidden">
        <div class="p-8 text-center">
            <div class="w-16 h-16 bg-success/20 rounded-full flex items-center justify-center text-success mx-auto mb-6 border border-success/30">
                <span class="material-symbols-outlined text-4xl">check_circle</span>
            </div>
            
            <h3 class="text-xl font-black text-on-background mb-2 uppercase tracking-tight">Operacion Exitosa</h3>
            <p class="text-sm text-jmie-gray font-bold mb-8">{{ mensaje|default:"El movimiento ha sido registrado correctamente." }}</p>

            {% if acta %}
            <div class="bg-jmie-blue/10 border border-jmie-blue/20 rounded-xl p-5 mb-6">
                <p class="text-[10px] font-black uppercase text-jmie-blue tracking-widest mb-3">Documentacion Legal Generada</p>
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg mb-4">
                    <span class="text-xs font-black text-on-background">{{ acta.folio }}</span>
                    <span class="text-[10px] font-bold text-jmie-gray">{{ acta.get_tipo_acta_display }}</span>
                </div>
                <div class="flex flex-col gap-3">
                    <a href="{% url 'actas:acta_pdf' acta.pk %}" 
                       target="_blank"
                       class="w-full py-3 bg-jmie-orange text-white text-xs font-black uppercase tracking-widest rounded-xl hover:brightness-110 shadow-[0_4px_15px_rgba(237,139,0,0.3)] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">picture_as_pdf</span>
                        Descargar Acta PDF
                    </a>
                </div>
            </div>
            {% endif %}

            <button @click="location.reload()" 
                    class="w-full py-3 bg-surface-container-highest hover:bg-white/5 text-on-background text-xs font-black uppercase tracking-widest rounded-xl border border-white/10 transition-all">
                Finalizar y Actualizar
            </button>
        </div>
    </div>
</div>
