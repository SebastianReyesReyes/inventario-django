<!DOCTYPE html>
<html lang="es">
{% load acta_tags %}
{% load static %}
<head>
    <meta charset="UTF-8">
    <style>
        /* === Reset y base === */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 9pt;
            line-height: 1.3;
            color: #222;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* === Header con logo y folio === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #003594;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .logo { font-size: 18pt; font-weight: bold; color: #003594; }
        .logo img { max-width: 130px; height: auto; }

        .acta-info { text-align: right; }
        .acta-info h1 {
            font-size: 14pt;
            margin: 0;
            color: #003594;
            text-transform: uppercase;
        }
        .acta-info p {
            margin: 2pt 0;
            font-weight: bold;
            font-size: 9pt;
        }

        .clear { clear: both; }

        /* === Section titles === */
        .section-title {
            background: #f1f3f8;
            padding: 6pt 10pt;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 8.5pt;
            margin: 14pt 0 6pt 0;
            border-left: 3pt solid #ED8B00;
        }

        /* === Tables === */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10pt;
            font-size: 8pt;
        }

        table th {
            background: #003594;
            color: white;
            font-size: 7.5pt;
            padding: 6pt;
            text-transform: uppercase;
            text-align: left;
            font-weight: bold;
        }

        table td {
            border: 0.5pt solid #ddd;
            padding: 5pt;
            font-size: 8pt;
        }

        /* === Clauses === */
        .clauses {
            font-size: 8.5pt;
            text-align: justify;
            margin-top: 12pt;
        }

        .clauses h3 {
            font-size: 9pt;
            margin-bottom: 4pt;
            color: #003594;
            border-bottom: 0.5pt solid #eee;
        }

        .clauses ol { margin-top: 3pt; padding-left: 14pt; }
        .clauses li { margin-bottom: 3pt; }

        /* === Signatures (flexbox, soportado por Playwright/Chromium) === */
        .signatures {
            margin-top: 24pt;
        }

        .signature-row {
            display: flex;
            justify-content: space-between;
            gap: 16pt;
            flex-wrap: wrap;
            width: 100%;
        }

        .signature-box {
            flex: 1;
            min-width: 120pt;
            text-align: center;
        }

        .signature-line {
            border-top: 0.5pt solid #333;
            margin-top: 28pt;
            padding-top: 4pt;
            font-size: 8pt;
        }

        .signature-line strong {
            display: block;
            margin-bottom: 2pt;
        }

        /* === Footer legal === */
        .footer-legal {
            margin-top: 16pt;
            border-top: 0.5pt solid #ddd;
            padding-top: 8pt;
            font-size: 7pt;
            color: #888;
            text-align: center;
            font-style: italic;
        }

        /* === Observations === */
        .observation-box {
            font-size: 8pt;
            min-height: 30pt;
            padding: 5pt;
            border: 0.5pt solid #ccc;
            background: #fafafa;
        }

        /* === Watermark: oculto en PDF === */
        .watermark { display: none; }
    </style>
</head>
<body>
    {% include "actas/partials/acta_pdf_body.html" %}
</body>
</html>
