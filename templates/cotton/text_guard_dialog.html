<!-- 
  Modal de confirmación con text-guard (escribir texto para habilitar botón destructivo).
  
  Uso:
    <c-text-guard-dialog
      dialog_title="Eliminar acta"
      message="Esta acción es irreversible."
      guard_text="ELIMINAR"
      guard_label="Escriba ELIMINAR para confirmar"
      confirm_text="Eliminar"
      confirm_class="bg-error hover:brightness-110"
      attrs="hx-delete='{% url ... %}' hx-target='#tabla-wrapper'"
    >
      Contenido adicional del body (opcional)
    </c-text-guard-dialog>
-->
<div x-data="{ open: true, guardInput: '', canConfirm: false }" 
     x-show="open" 
     x-cloak
     @modal-close.window="open = false; setTimeout(() => { $el.remove() }, 300)"
     @keydown.escape.window="open = false; setTimeout(() => { $el.remove() }, 300)"
     class="fixed inset-0 z-[60] flex items-center justify-center p-4">
    
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-background/80 backdrop-blur-md" @click="open = false; setTimeout(() => { $el.remove() }, 300)"></div>

    <!-- Dialog -->
    <div x-show="open"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative w-full max-w-lg bg-surface-container border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-visible">
        
        <!-- Glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 rounded-full blur-[80px] {{ severity_class|default:'bg-error/10' }}"></div>

        <div class="p-8 relative">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center border {{ icon_class|default:'bg-error/10 text-error border-error/20' }}">
                        <span class="material-symbols-outlined text-3xl">{{ icon|default:'warning' }}</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-black tracking-tighter uppercase">{{ dialog_title|default:"Confirmar acción" }}</h2>
                        {% if subtitle %}
                        <p class="text-jmie-gray text-xs font-bold uppercase tracking-widest mt-0.5">{{ subtitle }}</p>
                        {% endif %}
                    </div>
                </div>
                <button @click="open = false; setTimeout(() => { $el.remove() }, 300)" 
                        class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Body slot -->
            <div class="space-y-4 mb-6">
                {% if message %}
                <p class="text-sm text-on-surface-variant leading-relaxed">{{ message }}</p>
                {% endif %}
                {{ slot }}
            </div>

            <!-- Text Guard -->
            <div class="space-y-2 mb-6 p-4 rounded-xl bg-white/[0.02] border border-white/5">
                <label class="text-[10px] font-black uppercase tracking-widest text-jmie-gray ml-1">
                    {{ guard_label|default:"Escriba el texto para confirmar" }} <span class="text-error">*</span>
                </label>
                <input type="text" 
                       x-model="guardInput"
                       :class="guardInput === '{{ guard_text }}' ? 'border-emerald-500/50 bg-emerald-500/5' : 'border-white/10 bg-white/[0.02]'"
                       class="w-full px-4 py-3 rounded-xl text-sm font-mono font-bold text-on-background border transition-all focus:outline-none focus:ring-2 focus:ring-jmie-orange/50 placeholder:text-jmie-gray/40"
                       placeholder="{{ guard_text }}"
                       autocomplete="off"
                       spellcheck="false">
                <p x-show="guardInput.length > 0 && guardInput !== '{{ guard_text }}'" 
                   x-cloak
                   class="text-[10px] text-error font-bold">
                    El texto no coincide
                </p>
                <p x-show="guardInput === '{{ guard_text }}'" 
                   class="text-[10px] text-emerald-400 font-bold">
                    ✓ Texto correcto
                </p>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-between pt-4 border-t border-white/5">
                <div id="form-indicator" class="htmx-indicator flex items-center gap-2 text-jmie-blue">
                    <div class="w-4 h-4 border-2 border-current border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-[10px] font-black uppercase tracking-widest">Procesando...</span>
                </div>
                <div class="flex gap-3 ml-auto">
                    <button type="button"
                            @click="open = false; setTimeout(() => { $el.remove() }, 300)"
                            class="px-6 py-2.5 text-xs font-black uppercase tracking-widest text-jmie-gray hover:text-on-background border border-white/10 rounded-xl hover:bg-white/5 transition-all">
                        {{ cancel_text|default:"Cancelar" }}
                    </button>
                    <button type="button"
                            :disabled="guardInput !== '{{ guard_text }}'"
                            :class="guardInput === '{{ guard_text }}' ? 'opacity-100 cursor-pointer' : 'opacity-40 cursor-not-allowed'"
                            @click="if (guardInput === '{{ guard_text }}') { $nextTick(() => $refs.guardConfirm.click()) }"
                            class="px-8 py-2.5 text-white text-xs font-black uppercase tracking-widest rounded-xl shadow-lg transition-all flex items-center gap-2 {{ confirm_class|default:'bg-error hover:brightness-110 shadow-[0_10px_30px_rgba(239,68,68,0.2)]' }}">
                        <span class="material-symbols-outlined text-sm">{{ confirm_icon|default:'delete_forever' }}</span>
                        {{ confirm_text|default:"Confirmar" }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden HTMX trigger -->
    <button x-ref="guardConfirm" type="button" class="hidden" {{ attrs }}></button>
</div>
