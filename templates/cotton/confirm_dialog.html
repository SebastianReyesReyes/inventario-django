<div x-data="{ open: false }" class="inline-block">
    <!-- Visible trigger -->
    <button type="button" @click="open = true" class="{{ trigger_class }}" title="{{ title }}">
        {{ slot }}
    </button>

    <!-- Confirmation Modal -->
    <div
        x-show="open"
        x-cloak
        class="fixed inset-0 z-[60] flex items-center justify-center"
        @keydown.escape.window="open = false"
    >
        <!-- Backdrop -->
        <div
            x-show="open"
            x-transition:enter="ease-out duration-200"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="ease-in duration-150"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="absolute inset-0 bg-background/80 backdrop-blur-sm"
            @click="open = false"
        ></div>

        <!-- Dialog -->
        <div
            x-show="open"
            x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 scale-100"
            x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 scale-95"
            class="relative bg-surface-container rounded-2xl border border-white/5 shadow-2xl p-6 max-w-sm w-full mx-4"
        >
            <div class="flex items-center gap-4 mb-4">
                <div class="p-2.5 bg-error/10 text-error rounded-xl border border-error/20">
                    <span class="material-symbols-outlined text-[24px]">warning</span>
                </div>
                <div>
                    <h3 class="text-lg font-black text-on-background">{{ dialog_title|default:"Confirmar acción" }}</h3>
                    <p class="text-xs text-jmie-gray mt-0.5">{{ message }}</p>
                </div>
            </div>

            <div class="flex gap-3 justify-end">
                <button
                    type="button"
                    @click="open = false"
                    class="px-4 py-2 text-xs font-black uppercase tracking-widest text-on-surface bg-white/5 hover:bg-white/10 rounded-lg border border-white/10 transition-all"
                >
                    {{ cancel_text|default:"Cancelar" }}
                </button>
                <button
                    type="button"
                    @click="open = false; $nextTick(() => $refs.confirmAction.click())"
                    class="px-4 py-2 text-xs font-black uppercase tracking-widest text-white bg-error hover:brightness-110 rounded-lg shadow-[0_0_10px_rgba(239,68,68,0.2)] transition-all"
                >
                    {{ confirm_text|default:"Eliminar" }}
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden HTMX action button -->
    <button
        x-ref="confirmAction"
        type="button"
        class="hidden"
        {{ attrs }}
    >
        {{ slot }}
    </button>
</div>
