<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Previa del Acta — {{ acta.folio|default:"PENDIENTE" }}</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            padding: 32px 16px;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        .toolbar {
            max-width: 850px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .toolbar h1 {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0;
        }
        .toolbar .badge {
            background: #f59e0b;
            color: #1e293b;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .toolbar a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            transition: color 0.2s;
        }
        .toolbar a:hover { color: #e2e8f0; }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <h1>Vista Previa del Acta</h1>
            <span class="badge">⚠ Preliminar</span>
        </div>
        <a href="javascript:window.close()">✕ Cerrar</a>
    </div>
    <div class="container">
        {{ preview_html|safe }}
    </div>
</body>
</html>
