<div x-data="{ showModal: true }" x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div @click="showModal = false" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    
    <div class="relative bg-surface-container rounded-2xl border border-white/10 shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-on-background flex items-center gap-2">
                    <span class="material-symbols-outlined text-jmie-orange">swap_horiz</span>
                    Reasignar Equipo
                </h3>
                <button @click="showModal = false" class="text-jmie-gray hover:text-on-background transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="p-3 bg-white/5 border border-white/10 rounded-xl opacity-60">
                    <p class="text-[10px] text-jmie-gray uppercase tracking-widest font-black mb-1">Anterior</p>
                    <p class="text-xs text-on-background font-bold truncate">{{ anterior|default:"S/A" }}</p>
                </div>
                <div class="p-3 bg-jmie-orange/10 border border-jmie-orange/20 rounded-xl">
                    <p class="text-[10px] text-jmie-orange uppercase tracking-widest font-black mb-1">Nuevo</p>
                    <p class="text-xs text-on-background font-bold italic">Por asignar...</p>
                </div>
            </div>

            <form hx-post="{% url 'dispositivos:dispositivo_reasignar' dispositivo.pk %}"
                  hx-target="#modal-container"
                  hx-disabled-elt="this"
                  class="space-y-5">
                {% csrf_token %}
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter ml-1">Nuevo Responsable</label>
                    {{ form.colaborador }}
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase text-jmie-gray tracking-tighter ml-1">Condición Física</label>
                    {{ form.condicion_fisica }}
                </div>

                <div class="p-4 bg-jmie-orange/5 border border-jmie-orange/10 rounded-xl flex items-center gap-3">
                    {{ form.generar_acta }}
                    <label for="{{ form.generar_acta.id_for_label }}" class="text-xs font-bold text-on-surface cursor-pointer">
                        Generar Acta de Entrega automáticamente
                    </label>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-white/5">
                    <button type="button" @click="showModal = false"
                            class="px-5 py-2.5 rounded-xl border border-white/10 text-on-background hover:bg-white/5 transition-all text-xs font-bold">
                        Cancelar
                    </button>
                    <button type="submit" 
                            class="px-6 py-2.5 rounded-xl bg-jmie-orange text-white font-black uppercase tracking-widest text-[10px] hover:brightness-110 shadow-[0_4px_15px_rgba(237,139,0,0.3)] transition-all flex items-center gap-2">
                        <span>Ejecutar Reasignación</span>
                        <div class="htmx-indicator animate-spin h-3 w-3 border-2 border-white/30 border-t-white rounded-full"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
